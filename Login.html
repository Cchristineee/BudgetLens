<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="Login.css">

</head>
<body>
    <header class="navbar">
        <!-- links back to the landing page when the logo is clicked -->
         <a href="LandingPage.html" class="logo">Budget<span>Lens</span></a>

         <a href="Signup.html">
            <button class="Sign Up">Sign Up</button>
         </a>
    </header>

    <!-- Login card-->
     <div class="container">
        <div class="card">
            <h2>Welcome Back</h2>
            <p> Sign in to your BudgetLens account </p>

        <div class="form-group>
            <label>USERNAME</label>
            <input type="text" placeholder="Your username...."/>
        </div>

        <div class="form-group>
            <label>PASSWORD</label>
            <input type="password" placeholder="Password...."/>
        </div>

        <div class="forgot>Forgot Password?</div>

        <button class="login-btn">Login</button>
        <div class="footer-text">
            New to BudgetLens? <a href="Signup.html">Create an account</a>
        </div>
            
        </div>
        </div>
     </div>      
</body>
</html>
