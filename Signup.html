<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetLens - Sign Up</title>
    <link rel="stylesheet" href="Signup.css">

</head>
   <body>
      <header class="navbar">
        <a href="LandingPage.html" class="logo">Budget<span>Lens</span></a>
        <a href="Login.html" class="nav-btn">Login</a>
      </header>

    <main class="page-wrapper">
        <div class="container">
            <div class="card">
                <h2>Create an Account</h2>
                <p>Join BudgetLens to start tracking your spending</p>

                <form>
                    <div class="form-group">
                        <label for="username">USERNAME</label>
                        <input type="text" id="username" placeholder="Enter a unique username...." required/>
                    </div>
                    <div class="form-group">
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password" placeholder="Create a strong password...." required/>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">CONFIRM PASSWORD</label>
                        <input type="password" id="confirm-password" placeholder="Re-enter your password...." required/>
                    </div>
                    
                    <button class="createaccount-btn">Create Account</button>
                </form>

                <div class="footer-text">
                   Already have an account? <a href="Login.html">Sign in</a>
                </div>
            </div>
        </div>

    </main>  

</html>
