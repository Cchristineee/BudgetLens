<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetLens - Change Password</title>
    <link rel="stylesheet" href="change_password.css">
</head>
<body>

    <header class="top-header">
        <div class="logo">Budget<span>Lens</span></div>
        <a href="Login.html" class="signup-btn">Login</a>
    </header>

    <main class="page-wrapper">
        <section class="password-card">
            <h1>Wanna change password?</h1>
                <p class="subtitle">Enter a new password below</p>

            <form>
                <label for="new-password">NEW PASSWORD</label>
                <input 
                    type="password" id="new-password" placeholder="New Password....">

                <label for="confirm-password">CONFIRM PASSWORD</label>
                <input 
                    type="password" id="confirm-password" placeholder="Confirm Password....">
                
                <button type="button">Change Password</button>
            </form>

        <p class="back-login">Remember your password?
            <a href="Login.html">Back to login</a>
        </p>
        </section>
</body>
</html>
